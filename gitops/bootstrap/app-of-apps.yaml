apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenant-applications
  namespace: argocd
spec:
  project: tenants
  source:
    repoURL: https://github.com/example/internal-developer-platform-control-plane
    targetRevision: main
    path: gitops/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
